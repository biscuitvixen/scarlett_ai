name: Build and publish container

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # arm64 build for the DGX Spark, amd64 for everything else.
      # QEMU lets this amd64 runner emulate arm64 so we can build both from one job.
      - uses: docker/setup-qemu-action@v3
      # Buildx is the extended builder that does multi-platform builds and layer caching.
      - uses: docker/setup-buildx-action@v3

      # Skip the registry login on PRs since we don't push those images.
      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derives image tags from the git ref: branch name, semver from v* tags, and the commit sha.
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Persist Docker layers in the GitHub Actions cache so unchanged layers
          # (apt installs, pip installs) are reused instead of rebuilt every run.
          # mode=max caches intermediate layers too, not just the final image.
          cache-from: type=gha
          cache-to: type=gha,mode=max
