services:
  bot:
    build: .
    env_file:
      - path: .env
        required: false
    restart: unless-stopped
    depends_on:
      - lavalink

  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4
    restart: unless-stopped
    environment:
      LAVALINK_SERVER_PASSWORD: ${LAVALINK_PASSWORD:-youshallnotpass}
    volumes:
      - ./lavalink/application.yml:/opt/Lavalink/application.yml:ro
    expose:
      - "2333"

  # LLM backend, opt-in so the bot can run without it:
  #   docker compose --profile llm up -d
  # The DGX Spark is aarch64, so this needs NVIDIA's arm64 build.
  # Check NGC for the current tag before first use.
  vllm:
    profiles: ["llm"]
    image: nvcr.io/nvidia/vllm:25.06-py3
    restart: unless-stopped
    command: vllm serve ${LLM_MODEL} --host 0.0.0.0 --port 8000
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - hf-cache:/root/.cache/huggingface
    ports:
      - "8000:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  hf-cache:
