services:
  bot:
    build: .
    env_file:
      - path: .env
        required: false
    restart: unless-stopped
    volumes:
      # sqlite db (user timezones etc) survives container recreates
      - bot-data:/app/data
      # mounted over the baked-in copy so personality edits apply live
      - ./personality.md:/app/personality.md:ro
    depends_on:
      - lavalink

  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4
    restart: unless-stopped
    environment:
      LAVALINK_SERVER_PASSWORD: ${LAVALINK_PASSWORD:-youshallnotpass}
    volumes:
      - ./lavalink/application.yml:/opt/Lavalink/application.yml:ro
      # Cache downloaded plugin jars so they survive container recreates.
      # Lavalink runs as uid 322 but docker creates fresh volumes as root,
      # so on first run on a new machine the plugin download hits
      # "Permission denied" until:
      #   docker run --rm -v scarlett_ai_lavalink-plugins:/p alpine chown -R 322:322 /p
      - lavalink-plugins:/opt/Lavalink/plugins
    expose:
      - "2333"

  # LLM backend, opt-in so the bot can run without it:
  #   docker compose --profile llm up -d
  # The DGX Spark is aarch64, so this needs NVIDIA's arm64 build.
  # Check NGC for the current tag before first use.
  vllm:
    profiles: ["llm"]
    build:
      context: .
      dockerfile: vllm.Dockerfile
    restart: unless-stopped
    # Memory on the Spark is unified, the OS and other processes share it
    # with the GPU, so vllm's default 0.92 utilization target exceeds what
    # is actually free and it refuses to start. 0.70 of 128GB still fits a
    # 32B model plus generous kv cache.
    command: >
      vllm serve ${LLM_MODEL} --host 0.0.0.0 --port 8000
      --gpu-memory-utilization ${GPU_MEM_UTIL:-0.70}
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - hf-cache:/root/.cache/huggingface
    ports:
      - "8000:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  hf-cache:
  lavalink-plugins:
  bot-data:
