server:
  port: 2333
  address: 0.0.0.0

lavalink:
  plugins:
    # Lavalink 4 dropped built-in YouTube, it needs the youtube-source
    # plugin (https://github.com/lavalink-devs/youtube-source). Fetched
    # from Maven on first boot into /opt/Lavalink/plugins.
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.1"
      repository: "https://maven.lavalink.dev/releases"
  server:
    # Overridden by LAVALINK_SERVER_PASSWORD from the compose file
    password: youshallnotpass
    sources:
      # YouTube is handled by the youtube-source plugin, so the deprecated
      # built-in source MUST be turned off explicitly. Leaving it out defaults
      # to true, and then ytsearch: hits the broken built-in and 400s.
      youtube: false
      soundcloud: true
      bandcamp: true
      twitch: true
      vimeo: true
      http: true
      local: false

plugins:
  youtube:
    enabled: true
    # OAuth is the reliable cure for YouTube's "sign in to confirm you're not
    # a bot" errors. The refresh token is a secret, so it lives in .env as
    # YOUTUBE_OAUTH_REFRESH_TOKEN and is injected here via the compose file.
    # Leave it blank on a fresh box: the plugin then prints a device-link URL
    # and code in the logs, authorise with a BURNER google account (never your
    # main one), grab the refresh token it logs, and put it in .env.
    oauth:
      enabled: true
      refreshToken: "${YOUTUBE_OAUTH_REFRESH_TOKEN:}"
    # Client identities Lavalink impersonates. When Google breaks one it
    # falls through to the next, so keep several listed. The fast no-login
    # clients go first; TV is last because it is the only OAuth-compatible
    # client, so the refresh token above kicks in as the fallback exactly
    # when Google starts demanding a sign-in. (TVHTML5EMBEDDED was retired in
    # youtube-plugin 1.18.0, don't put it back.)
    clients:
      - MUSIC
      - ANDROID_VR
      - WEB
      - WEBEMBEDDED
      - TV

logging:
  level:
    root: INFO
    lavalink: INFO
    # so the OAuth device-link code and refresh token show up in the logs
    dev.lavalink.youtube.http.YoutubeOauth2Handler: INFO
